name: 刷步数

on:
  schedule:
    - cron: '0 0,1,8,9 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安装依赖（带详细输出）
        run: |
          pip install --upgrade pip
          echo "开始安装 requests..."
          pip install requests
          echo "开始安装 pycryptodome..."
          pip install pycryptodome
          echo "开始安装 pytz..."
          pip install pytz
          echo "查看已安装的包："
          pip list
          
      - name: 运行刷步数脚本
        env:
          CONFIG: ${{ secrets.CONFIG }}
          PAT: ${{ secrets.PAT }}
        run: |
          python main.py
